[pytest]
testpaths = tests
python_files = test*.py
markers =
    docker: tests that require a running Docker daemon
    docker_live: smoke tests against a live local Docker daemon (CI-opt-in)
    falsification: a kill-confirmed test born from mutation testing — it
        was proven to FAIL when the specific guard it defends is broken,
        not merely to pass. Its docstring records the killed mutation on a
        "Kills:" line. Run the class with `pytest -m falsification`.
