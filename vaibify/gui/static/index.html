<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaibify</title>
    <link rel="stylesheet" href="/static/styleMain.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>

<!-- Container Picker -->
<div id="containerPicker">
    <img src="/static/vaibify_logo_paleblue.png" alt="Vaibify"
         class="vaibify-logo-large">
    <p class="subtitle">Workflow Viewer</p>
    <div id="listContainers">
        <p style="color: var(--text-muted); text-align: center;">
            Loading containers...
        </p>
    </div>
</div>

<!-- Workflow Selector -->
<div id="workflowPicker" style="display: none;">
    <img src="/static/vaibify_logo_paleblue_dark.png" alt="Vaibify"
         class="vaibify-logo-large">
    <p class="subtitle" id="workflowPickerSubtitle">Select Workflow</p>
    <div id="listWorkflows"></div>
    <div style="margin-top: 16px; display: flex; gap: 8px;">
        <button class="btn" id="btnWorkflowBack">Back</button>
        <button class="btn btn-primary" id="btnNewWorkflow">
            New Workflow</button>
    </div>
</div>

<!-- Main Layout -->
<div id="mainLayout">
    <!-- Toolbar -->
    <div id="toolbar">
        <img src="/static/vaibify_logo_paleblue.png" alt="Vaibify"
             class="toolbar-logo">
        <span id="activeWorkflowName" class="toolbar-workflow"
              title="Click to switch workflow"></span>
        <button class="btn btn-primary" id="btnRunSelected"
                title="Run checked steps">Run Selected</button>
        <button class="btn" id="btnRunAll"
                title="Run all steps">Run All</button>
        <button class="btn" id="btnVerify"
                title="Verify outputs only">Verify</button>
        <button class="btn" id="btnValidateReferences"
                title="Check cross-step references">Validate</button>
        <button class="btn" id="btnMonitor"
                title="Resource monitor">Monitor</button>
        <button class="btn" id="btnOverleafPush"
                title="Push to Overleaf">Push to Overleaf</button>
        <button class="btn" id="btnZenodoArchive"
                title="Archive to Zenodo">Archive to Zenodo</button>
        <button class="btn" id="btnVsCode"
                title="Open in VS Code">VS Code</button>
        <button class="btn" id="btnDisconnect"
                title="Disconnect from container">Disconnect</button>
    </div>

    <!-- Left Panel -->
    <div id="panelLeft">
        <div id="leftPanelTabs">
            <div class="left-tab active" data-panel="steps">Steps</div>
            <div class="left-tab" data-panel="files">Files</div>
            <div class="left-tab" data-panel="logs">Logs</div>
        </div>

        <!-- Steps sub-panel -->
        <div id="panelSteps" class="active">
            <div class="panel-header">
                <button class="btn-icon" id="btnGlobalSettings"
                        title="Workflow settings">&#9881;</button>
                <button class="btn-icon" id="btnNewStep"
                        title="Create new step">+</button>
            </div>
            <div id="globalSettingsPanel" class="global-settings"></div>
            <div id="listSteps"></div>
        </div>

        <!-- Files sub-panel -->
        <div id="panelFiles">
            <div id="fileBreadcrumb"></div>
            <div id="listFiles"></div>
        </div>

        <!-- Logs sub-panel -->
        <div id="panelLogs">
            <div id="listLogs"></div>
        </div>

        <div class="resize-handle-horizontal"></div>
    </div>

    <!-- Right Panels -->
    <div id="panelRight">
        <!-- Dual Viewer -->
        <div id="panelViewerDual">
            <!-- Viewer A -->
            <div class="viewer-panel" id="viewerA">
                <div class="panel-header">
                    <button class="btn-icon viewer-nav" id="btnBackA"
                            title="Back" disabled>&#9664;</button>
                    <button class="btn-icon viewer-nav" id="btnForwardA"
                            title="Forward" disabled>&#9654;</button>
                    <select class="viewer-select" id="selectFigureA">
                        <option value="">Select a file...</option>
                    </select>
                    <button class="btn-icon" id="btnRefreshA"
                            title="Refresh">&#x21bb;</button>
                </div>
                <div class="viewer-viewport" id="viewportA">
                    <span class="placeholder">
                        Drop a file here or select a step
                    </span>
                </div>
            </div>

            <!-- Viewer resize handle -->
            <div class="resize-handle-viewer" id="resizeHandleViewer"></div>

            <!-- Viewer B -->
            <div class="viewer-panel" id="viewerB">
                <div class="panel-header">
                    <button class="btn-icon viewer-nav" id="btnBackB"
                            title="Back" disabled>&#9664;</button>
                    <button class="btn-icon viewer-nav" id="btnForwardB"
                            title="Forward" disabled>&#9654;</button>
                    <select class="viewer-select" id="selectFigureB">
                        <option value="">Select a file...</option>
                    </select>
                    <button class="btn-icon" id="btnRefreshB"
                            title="Refresh">&#x21bb;</button>
                </div>
                <div class="viewer-viewport" id="viewportB">
                    <span class="placeholder">
                        Drop a file here to compare
                    </span>
                </div>
            </div>
        </div>

        <!-- Resize handle -->
        <div class="resize-handle-vertical" id="resizeHandleVertical"></div>

        <!-- Terminal Strip (up to 3 resizable panes) -->
        <div id="terminalStrip">
            <div class="terminal-pane" id="terminalPane0">
                <div class="terminal-pane-tabs">
                    <button class="terminal-pane-add" data-pane="0"
                            title="New tab">+</button>
                </div>
                <div class="terminal-pane-container"></div>
            </div>
        </div>
        <div id="terminalStripToolbar">
            <button class="btn-icon" id="btnAddTerminalPane"
                    title="Add terminal pane (max 3)">+ Pane</button>
        </div>
    </div>
</div>

<!-- Step Editor Modal -->
<div class="modal-overlay" id="modalStepEditor">
    <div class="modal">
        <h2 id="modalTitle">New Step</h2>
        <div class="form-group">
            <label>Step Name</label>
            <input type="text" id="inputStepName"
                   placeholder="e.g. Maximum Likelihood Estimation">
        </div>
        <div class="form-group">
            <label>Working Directory</label>
            <input type="text" id="inputStepDirectory"
                   placeholder="e.g. XUV/Distributions/Ribas/LXUV">
        </div>
        <div class="form-group">
            <div class="toggle-row">
                <input type="checkbox" id="inputPlotOnly" checked>
                <label style="margin-bottom:0; text-transform:none;">
                    Plot only (skip setup commands)
                </label>
            </div>
        </div>
        <div class="form-group">
            <label>Setup Commands (one per line)</label>
            <textarea id="inputSetupCommands"
                      placeholder="Heavy computation commands..."></textarea>
        </div>
        <div class="form-group">
            <label>Commands (one per line)</label>
            <textarea id="inputCommands"
                      placeholder="Plotting / analysis commands..."></textarea>
        </div>
        <div class="form-group">
            <label>Output Files (one per line)</label>
            <textarea id="inputOutputFiles"
                      placeholder="Expected output file paths..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn" id="btnModalCancel">Cancel</button>
            <button class="btn btn-primary" id="btnModalSave">Save</button>
        </div>
    </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" data-action="edit">Edit Step</div>
    <div class="context-menu-item" data-action="runFrom">
        Run From Here</div>
    <div class="context-menu-item" data-action="insertBefore">
        Insert Step Before</div>
    <div class="context-menu-item" data-action="insertAfter">
        Insert Step After</div>
    <div class="context-menu-separator"></div>
    <div class="context-menu-item danger" data-action="delete">
        Delete Step</div>
</div>

<!-- Error Modal -->
<div class="modal-overlay" id="modalError" style="display: none;">
    <div class="modal">
        <h2 style="color: var(--color-red, #e74c3c);">Pipeline Error</h2>
        <pre id="modalErrorContent"
             style="max-height: 400px; overflow: auto; white-space: pre-wrap;
                    font-size: 12px; background: var(--bg-secondary);
                    padding: 12px; border-radius: 4px;"></pre>
        <div class="modal-actions">
            <button class="btn btn-primary" id="btnModalErrorClose">Close</button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="/static/scriptApplication.js"></script>
<script src="/static/scriptFigureViewer.js"></script>
<script src="/static/scriptTerminal.js"></script>
<script src="/static/scriptStepEditor.js"></script>
<script src="/static/scriptResourceMonitor.js"></script>
</body>
</html>
