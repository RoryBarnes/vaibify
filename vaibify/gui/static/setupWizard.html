<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaibify Setup</title>
    <link rel="stylesheet" href="/static/styleSetupWizard.css">
</head>
<body>

<div class="setup-container">
    <h1 class="setup-title">Vaibify Setup</h1>
    <p class="setup-subtitle">Configure your development container</p>

    <!-- Template Selector -->
    <section class="setup-section">
        <h2 class="section-heading">Template</h2>
        <div id="templateGrid" class="template-grid">
            <p class="loading-message">Loading templates...</p>
        </div>
    </section>

    <form id="setupForm" autocomplete="off">

        <!-- Project Settings -->
        <section class="setup-section">
            <h2 class="section-heading">Project Settings</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="projectName">Project Name *</label>
                    <input type="text" id="projectName" name="projectName"
                           placeholder="e.g. my-research-project" required>
                </div>
                <div class="form-group">
                    <label for="containerUser">Container User</label>
                    <input type="text" id="containerUser" name="containerUser"
                           placeholder="e.g. researcher" value="">
                </div>
                <div class="form-group">
                    <label for="pythonVersion">Python Version</label>
                    <input type="text" id="pythonVersion" name="pythonVersion"
                           placeholder="e.g. 3.12" value="3.12">
                </div>
                <div class="form-group">
                    <label for="baseImage">Base Image</label>
                    <input type="text" id="baseImage" name="baseImage"
                           placeholder="e.g. ubuntu:24.04" value="ubuntu:24.04">
                </div>
                <div class="form-group">
                    <label for="workspaceRoot">Workspace Root</label>
                    <input type="text" id="workspaceRoot" name="workspaceRoot"
                           placeholder="e.g. /workspace" value="/workspace">
                </div>
                <div class="form-group">
                    <label for="packageManager">Package Manager</label>
                    <select id="packageManager" name="packageManager">
                        <option value="pip">pip</option>
                        <option value="conda">conda</option>
                        <option value="mamba">mamba</option>
                        <option value="uv">uv</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Repositories -->
        <section class="setup-section">
            <h2 class="section-heading">Repositories</h2>
            <div id="repoList" class="repo-list">
                <p class="muted-text">
                    No repositories added yet.
                </p>
            </div>
            <div class="repo-add-row">
                <input type="text" id="repoInput"
                       placeholder="https://github.com/user/repo.git">
                <button type="button" id="btnAddRepo" class="btn btn-primary">
                    Add
                </button>
            </div>
        </section>

        <!-- Features -->
        <section class="setup-section">
            <h2 class="section-heading">Features</h2>
            <div class="feature-grid">
                <label class="feature-card">
                    <input type="checkbox" id="featureJupyter"
                           name="features" value="jupyter">
                    <span class="feature-name">Jupyter</span>
                    <span class="feature-description">
                        JupyterLab notebook server
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureRLanguage"
                           name="features" value="rLanguage">
                    <span class="feature-name">R Language</span>
                    <span class="feature-description">
                        R runtime and IRkernel
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureJulia"
                           name="features" value="julia">
                    <span class="feature-name">Julia</span>
                    <span class="feature-description">
                        Julia language support
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureDatabase"
                           name="features" value="database">
                    <span class="feature-name">Database</span>
                    <span class="feature-description">
                        PostgreSQL client libraries
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureDvc"
                           name="features" value="dvc">
                    <span class="feature-name">DVC</span>
                    <span class="feature-description">
                        Data Version Control
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureLatex"
                           name="features" value="latex">
                    <span class="feature-name">LaTeX</span>
                    <span class="feature-description">
                        TeX Live for document compilation
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureClaude"
                           name="features" value="claude">
                    <span class="feature-name">Claude</span>
                    <span class="feature-description">
                        Claude Code CLI assistant
                    </span>
                </label>
                <label class="feature-card">
                    <input type="checkbox" id="featureGpu"
                           name="features" value="gpu">
                    <span class="feature-name">GPU</span>
                    <span class="feature-description">
                        NVIDIA CUDA toolkit support
                    </span>
                </label>
            </div>
        </section>

        <!-- Packages -->
        <section class="setup-section">
            <h2 class="section-heading">Packages</h2>
            <div class="form-group">
                <label for="pipPackages">pip packages (one per line)</label>
                <textarea id="pipPackages" name="pipPackages" rows="4"
                          placeholder="numpy&#10;matplotlib&#10;scipy"></textarea>
            </div>
            <div class="form-group">
                <label for="aptPackages">apt packages (one per line)</label>
                <textarea id="aptPackages" name="aptPackages" rows="3"
                          placeholder="build-essential&#10;gfortran"></textarea>
            </div>
        </section>

        <!-- Reproducibility -->
        <section class="setup-section">
            <h2 class="section-heading">Reproducibility</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="overleafProjectId">Overleaf Project ID</label>
                    <input type="text" id="overleafProjectId"
                           name="overleafProjectId"
                           placeholder="Optional Overleaf project ID">
                </div>
                <div class="form-group">
                    <label for="zenodoDepositionId">Zenodo Deposition ID</label>
                    <input type="text" id="zenodoDepositionId"
                           name="zenodoDepositionId"
                           placeholder="Optional Zenodo deposition ID">
                </div>
            </div>
        </section>

        <!-- Actions -->
        <div class="setup-actions">
            <button type="button" id="btnSaveConfig" class="btn btn-primary">
                Save Configuration
            </button>
            <button type="button" id="btnBuildContainer" class="btn">
                Build Container
            </button>
        </div>

    </form>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script src="/static/scriptSetupWizard.js"></script>
</body>
</html>
