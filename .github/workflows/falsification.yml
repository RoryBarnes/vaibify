# Named, badged check for the architectural-invariant and falsification
# suites, plus the standing "re-kill" harness.
#
# The full 24-cell matrix coverage of the invariant/falsification *tests*
# already comes from tests-linux.yml and tests-macos.yml, which collect
# them via `pytest tests/`. This workflow deliberately does NOT duplicate
# that. Its purpose is twofold:
#   1. Give the invariant + falsification suites a dedicated, named,
#      badgeable check that is easy to point at.
#   2. Run tools/reconfirmFalsification.py — the standing negative
#      control that re-applies each recorded mutation and confirms the
#      guarding test still FAILS (the "kill"). A nonzero exit means a
#      guard is no longer defended and MUST fail the job.
#
# The harness result is OS/Python-independent, so this runs on a
# representative subset (min/max Python on one Linux + one macOS) rather
# than the full matrix. README badges are owned by the Badge phase; this
# workflow does not touch README.

name: falsification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  falsification:
    name: '${{ matrix.os }}:python-${{ matrix.python-version }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
        python-version: ["3.9", "3.14"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Architectural invariants
        timeout-minutes: 15
        run: |
          python -m pytest tests/testArchitecturalInvariants.py -v

      - name: Falsification tests
        timeout-minutes: 15
        run: |
          python -m pytest -m falsification -v

      - name: Re-confirm falsification kills
        timeout-minutes: 25
        run: |
          python tools/reconfirmFalsification.py
