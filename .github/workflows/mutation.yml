name: mutation

# WARN-only cosmic-ray mutation gate, run ON DEMAND.
#
# This job is manual (workflow_dispatch) rather than per-PR: on the large
# feature-branch merges this project ships, mutation-testing the whole diff
# exceeded the 60-minute ceiling and was cancelled before it could post any
# signal -- an advisory gate that dies on the PRs that matter most is pure
# friction. Trigger it deliberately from the Actions tab (or the `gh`
# CLI) when you want mutation signal on a branch; the full falsification
# suite and architectural invariants are still graded for real, per-PR, by
# tests-linux / tests-macos.
#
# Scope: the Python lines the branch CHANGES vs. `base_ref` (narrowed by
# cr-filter-git). This job NEVER fails the build on surviving mutants --
# equivalent mutants make a hard fail untenable -- it surfaces survivors as
# a warning and a job-summary table for human triage. Two controls keep a
# run bounded: the suite runs with -n auto (cosmic-ray.toml), and
# `max_mutants` caps how many changed-line mutants are graded (0 = uncapped,
# and any capped mutants are reported, never dropped silently).

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Git ref to diff against for changed-line scoping"
        default: main
        required: false
      max_mutants:
        description: "Max changed-line mutants to grade (0 = uncapped)"
        default: "300"
        required: false

permissions:
  contents: read
  pull-requests: write  # post/update the warn-only survivor comment

jobs:
  mutation:
    name: cosmic-ray (changed lines, warn-only)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # dev extras supply the test-runner deps the mutation test-command
          # invokes (pytest-asyncio, httpx); mutation extras supply cosmic-ray.
          python -m pip install -e ".[dev,mutation]"

      - name: Fetch the base ref for the diff filter
        env:
          BASE_REF: ${{ inputs.base_ref || github.base_ref || 'main' }}
        run: |
          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          # Align the committed git-filter branch with this run's actual base.
          python - "$BASE_REF" <<'PY'
          import sys, toml
          sBaseRef = sys.argv[1]
          dictConfig = toml.load("cosmic-ray.toml")
          dictConfig["cosmic-ray"]["filters"]["git-filter"]["branch"] = f"origin/{sBaseRef}"
          with open("cosmic-ray.toml", "w") as handle:
              toml.dump(dictConfig, handle)
          PY

      - name: Initialize mutation session
        run: cosmic-ray init cosmic-ray.toml mutation-session.sqlite

      - name: Restrict to changed lines
        run: cr-filter-git --config cosmic-ray.toml mutation-session.sqlite

      - name: Cap the mutant budget (logged, never silent)
        env:
          MAX_MUTANTS: ${{ inputs.max_mutants || '300' }}
        run: |
          # cr-filter-git has marked every off-diff mutant SKIPPED, so the
          # pending items are exactly the changed-line mutants. If there are
          # more than the budget, mark the excess SKIPPED too -- taking an
          # evenly-strided sample of the sorted mutants so the kept ones
          # spread across every changed file instead of clustering in the
          # alphabetically-first one. The count skipped is recorded for the
          # report step; a cap is surfaced, never hidden.
          python - "${MAX_MUTANTS}" <<'PY'
          import sys
          from cosmic_ray.work_db import use_db, WorkDB
          from cosmic_ray.work_item import WorkResult, WorkerOutcome

          iCap = int(sys.argv[1] or 0)
          with open("mutants-capped.txt", "w") as handle:
              handle.write("0")
          if iCap <= 0:
              print("Mutant budget uncapped; grading every changed-line mutant.")
              sys.exit(0)

          with use_db("mutation-session.sqlite", WorkDB.Mode.open) as db:
              listPending = list(db.pending_work_items)
              iPending = len(listPending)
              if iPending <= iCap:
                  print(f"{iPending} mutant(s) in scope, within the "
                        f"{iCap} budget.")
                  sys.exit(0)
              listPending.sort(key=lambda workItem: (
                  workItem.mutations[0].module_path,
                  workItem.mutations[0].start_pos,
                  workItem.mutations[0].operator_name,
              ))
              setKeep = {
                  round(iIndex * (iPending - 1) / (iCap - 1)) if iCap > 1 else 0
                  for iIndex in range(iCap)
              }
              iSkipped = 0
              for iIndex, workItem in enumerate(listPending):
                  if iIndex in setKeep:
                      continue
                  db.set_result(workItem.job_id, WorkResult(
                      worker_outcome=WorkerOutcome.SKIPPED,
                      output="over the max_mutants budget",
                  ))
                  iSkipped += 1
          with open("mutants-capped.txt", "w") as handle:
              handle.write(str(iSkipped))
          print(f"{iPending} mutant(s) in scope; kept {len(setKeep)}, "
                f"skipped {iSkipped} to fit the {iCap} budget. Run "
                "cosmic-ray locally for full coverage on this diff.")
          PY

      - name: Execute mutants (warn-only, live progress)
        run: |
          # exec is silent by default, so a long run looks stalled in the
          # Actions log. Run it in the background and poll the session for a
          # live "graded out of total" counter. cr-filter-git has already
          # recorded a SKIPPED result for every off-diff mutant, so the
          # count of on-diff work is the pending items, and progress is the
          # results accrued ABOVE that skipped baseline. Concurrent reads
          # during exec's writes are lock-safe: the sqlite rollback journal
          # holds its write lock only for the brief commit at the end of
          # each multi-second mutant (verified: hundreds of poll reads, zero
          # "database is locked").

          # Helper: on-diff mutants graded so far, or "?" if the session is
          # momentarily unreadable — a transient read must never abort exec.
          cat > _mutation_graded.py <<'GRADEDPY'
          import sys
          from cosmic_ray.work_db import use_db, WorkDB
          iBaseline = int(sys.argv[1])
          try:
              with use_db("mutation-session.sqlite", WorkDB.Mode.open) as db:
                  print(max(0, db.num_results - iBaseline))
          except Exception:
              print("?")
          GRADEDPY

          sTotals="$(python - <<'TOTALSPY'
          from cosmic_ray.work_db import use_db, WorkDB
          with use_db("mutation-session.sqlite", WorkDB.Mode.open) as db:
              print(sum(1 for _ in db.pending_work_items), db.num_results)
          TOTALSPY
          )"
          read iTotal iBaseline <<< "${sTotals}" || true
          echo "Mutants to run on changed lines: ${iTotal:-0}"
          if [ "${iTotal:-0}" -eq 0 ]; then
            echo "No changed Python lines in scope; nothing to execute."
            exit 0
          fi

          # exec returns 0 even when mutants survive; survivors are a normal
          # outcome, not a build failure. The wait is guarded so triage runs
          # even if exec itself errors.
          cosmic-ray exec cosmic-ray.toml mutation-session.sqlite &
          iExecPid=$!
          while kill -0 "${iExecPid}" 2>/dev/null; do
            sleep 15
            iGraded=$(python _mutation_graded.py "${iBaseline}")
            [ "${iGraded}" = "?" ] && continue
            echo "cosmic-ray: ${iGraded}/${iTotal} mutants graded" \
              "($(( iGraded * 100 / iTotal ))%)"
          done
          wait "${iExecPid}" || true
          echo "cosmic-ray: exec finished —" \
            "$(python _mutation_graded.py "${iBaseline}")/${iTotal} graded."

      - name: Report surviving mutants
        if: always()
        run: |
          # Read the session through cosmic-ray's own WorkDB API. The
          # `cosmic-ray dump` serializer raises on SKIPPED results (their
          # test_outcome is None), and cr-filter-git produces exactly those,
          # so JSON dumping is unusable for a filtered session.
          python - <<'PY'
          import os
          from cosmic_ray.work_db import use_db, WorkDB
          from cosmic_ray.work_item import TestOutcome, WorkerOutcome

          listSurvivors = []
          iGraded = 0
          with use_db("mutation-session.sqlite", WorkDB.Mode.open) as db:
              for workItem, workResult in db.completed_work_items:
                  if workResult.worker_outcome != WorkerOutcome.NORMAL:
                      continue  # SKIPPED (off-diff), NO_TEST, or crashed
                  iGraded += 1
                  if workResult.test_outcome == TestOutcome.SURVIVED:
                      mutation = workItem.mutations[0]
                      listSurvivors.append((
                          mutation.module_path,
                          mutation.start_pos[0],
                          mutation.operator_name,
                          mutation.definition_name or "",
                      ))

          iCapped = 0
          try:
              with open("mutants-capped.txt") as handle:
                  iCapped = int(handle.read().strip() or 0)
          except OSError:
              pass

          listLines = []
          if iGraded == 0:
              listLines.append(
                  "Nothing to test: this branch changed no mutable Python "
                  "in the mutated scope, so no mutations were run."
              )
          elif not listSurvivors:
              listLines.append(
                  f"All {iGraded} deliberate break(s) in the changed code "
                  "were caught by a test — no gaps."
              )
          else:
              listLines.append(
                  f"{len(listSurvivors)} of {iGraded} deliberate break(s) in "
                  "the changed code were NOT caught by any test. Review each: "
                  "add or strengthen a test, or confirm the change has no "
                  "observable effect (an equivalent mutant)."
              )
              listLines.append("")
              listLines.append("| Module | Line | Operator | Function |")
              listLines.append("| --- | --- | --- | --- |")
              for sModule, iLine, sOperator, sFunction in listSurvivors:
                  listLines.append(
                      f"| `{sModule}` | {iLine} | `{sOperator}` | "
                      f"`{sFunction}` |"
                  )
                  print(
                      f"::warning file={sModule},line={iLine}::"
                      f"Surviving mutant ({sOperator}) in {sFunction or sModule}"
                  )

          if iCapped:
              listLines.append("")
              listLines.append(
                  f"Note: {iCapped} additional changed-line mutant(s) "
                  "exceeded the `max_mutants` budget and were not graded. "
                  "Re-run with `max_mutants: 0`, or run cosmic-ray locally, "
                  "for full coverage of this diff."
              )

          sSummary = "## Cosmic-ray mutation gate (warn-only)\n\n" + \
              "\n".join(listLines) + "\n"
          pathSummary = os.environ.get("GITHUB_STEP_SUMMARY")
          if pathSummary:
              with open(pathSummary, "a") as handle:
                  handle.write(sSummary)
          print(sSummary)

          # Body for the sticky PR comment. The HTML-comment marker on the
          # first line lets the next step find and update this same comment
          # instead of posting a new one every run.
          sMarker = "<!-- cosmic-ray-mutation-gate -->"
          with open("mutation-comment.md", "w", encoding="utf-8") as handle:
              handle.write(sMarker + "\n" + sSummary)
          PY

      - name: Post or update the sticky PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true  # warn-only: a comment failure never breaks the build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Find a prior comment carrying our marker; PATCH it in place, else
          # POST a fresh one. Best-effort: fork PRs get a read-only token and
          # cannot comment, which continue-on-error tolerates.
          sMarker='<!-- cosmic-ray-mutation-gate -->'
          iExisting=$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq "map(select(.body | contains(\"${sMarker}\"))) | .[0].id // empty" \
            | head -n1)
          if [ -n "${iExisting}" ]; then
            gh api -X PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${iExisting}" \
              -F body=@mutation-comment.md
          else
            gh api -X POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -F body=@mutation-comment.md
          fi
