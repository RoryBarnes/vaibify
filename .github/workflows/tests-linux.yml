name: tests-linux

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    name: '${{ matrix.os }}:python-${{ matrix.python-version }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        timeout-minutes: 15
        run: |
          python -m pytest tests/ -m "not docker" --tb=short -v --junitxml=junit/test-results.xml --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.9'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          name: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Parse test counts
        if: always() && matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.9'
        id: test_counts
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys, os
          tree = ET.parse('junit/test-results.xml')
          root = tree.getroot()
          iTests = int(root.attrib.get('tests', 0))
          iFailures = int(root.attrib.get('failures', 0))
          iErrors = int(root.attrib.get('errors', 0))
          iPassed = iTests - iFailures - iErrors
          if iFailures + iErrors > 0:
              sLabel = f'{iPassed} passed, {iFailures + iErrors} failed'
              sColor = 'red'
          else:
              sLabel = f'{iPassed} passed'
              sColor = 'brightgreen'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f'label={sLabel}\n')
              fh.write(f'color={sColor}\n')
          "

      - name: Update test count badge
        if: always() && matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.9'
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.TEST_BADGE_GIST_ID }}
          filename: vaibify-test-badge.json
          label: tests
          message: ${{ steps.test_counts.outputs.label }}
          color: ${{ steps.test_counts.outputs.color }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit/test-*.xml
          check_name: Test Results (${{ matrix.os }} py${{ matrix.python-version }})
